# ─────────────────────────────────────────────────────────────────────────
#  tmux — tuned for Neovim + Ghostty (github_dark_tritanopia)
# ─────────────────────────────────────────────────────────────────────────

# Prefix: C-a (and C-a C-a sends a literal C-a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on            # keep window numbers gapless
set -g set-clipboard on               # apps can set the system clipboard (OSC52)
set -g focus-events on                # Neovim autoread + vim-tmux-navigator rely on this
set -sg escape-time 10                # no <Esc> lag inside Neovim
set -g history-limit 50000
setw -g mode-keys vi
set -g default-shell "$SHELL"
set -g detach-on-destroy off          # jump to another session instead of detaching

# ── True color + colored undercurl (so Neovim renders correctly in tmux) ──
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p2%{256}%/%d::%p3%%d%;m'

# ── Extended keys (CSI-u / kitty protocol passthrough) ─────────────────────
# Without this, tmux collapses modified keys (Shift+Enter, C-h vs <BS>,
# C-i vs <Tab>) back to their plain byte before the app sees them — so
# Claude Code reads Shift+Enter as Enter and submits. "on" (not "always")
# only forwards extended keys to apps that request the protocol (Neovim,
# Claude Code); plain shells/TUIs are unaffected. Outer term (Ghostty)
# already speaks the kitty protocol. Needs a server restart to negotiate:
# `tmux kill-server`.
set -s extended-keys on
set -as terminal-features ",*:extkeys"

# ── Keys ──────────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded"
# Search scrollback: prefix + /   (built-in; replaces tmux-copycat)

# vi copy-mode → macOS clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ── Minimal status line (github_dark_tritanopia palette) ──────────────────
set -g status-interval 60
set -g status-justify left
set -g status-style "bg=#0d1117,fg=#8b949e"
set -g status-left "#[fg=#58a6ff,bold] #S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=#6e7681]%a %d %b  %H:%M "
set -g status-right-length 40

setw -g window-status-separator " "
# Coding-agent status pill. Claude Code hooks set the window option @agent:
#   working -> 🤖 (blue)   wait -> 💬 (amber, needs you)   done -> ✅ (green)
# Inactive windows surface the agent state so you can see, at a glance, which
# window is busy / blocked / finished. Style attrs are space-separated (not
# comma-separated) so the commas inside #{?...} stay unambiguous — no escaping.
setw -g window-status-format "#{?#{==:#{@agent},wait},#[fg=#0d1117 bg=#e3b341 bold] 💬 #I:#W ,#{?#{==:#{@agent},done},#[fg=#0d1117 bg=#2ea043 bold] ✅ #I:#W ,#{?#{==:#{@agent},working},#[fg=#ffffff bg=#1f6feb bold] 🤖 #I:#W ,#[fg=#c9d1d9 bg=#21262d] #I:#W }}}"
# current window: blue selected pill, prefixed with 🤖 while the agent works
setw -g window-status-current-format "#[fg=#0d1117 bg=#58a6ff bold] #{?#{==:#{@agent},working},🤖 ,}#I:#W "
# focusing a window clears the attention markers (💬 wait / ✅ done); a still
# -running 🤖 working state survives so you keep seeing active work
set-hook -g pane-focus-in "if -F '#{||:#{==:#{@agent},done},#{==:#{@agent},wait}}' 'set -uw @agent'"

set -g pane-border-style "fg=#21262d"
set -g pane-active-border-style "fg=#58a6ff"
set -g pane-border-indicators off     # colour the whole active border, not a half-line marker
set -g message-style "bg=#161b22,fg=#c9d1d9"
set -g mode-style "bg=#243e5d,fg=#c9d1d9"

# ── Plugins (TPM) ──────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Persist & auto-restore sessions across restarts.
# (Turn off auto-restore by removing the next line.)
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Keep this line last.
run '~/.tmux/plugins/tpm/tpm'
